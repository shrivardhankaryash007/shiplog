<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════════
  HOW TO ADD A SHIP  (the only thing you ever edit)
  ════════════════════════════════════════════════════════════════════
  Scroll to the SHIPS array below. Add ONE object to the TOP:

      {
        date: "2026-06-20",
        title: "Name of the thing",
        body:  "One or two sentences. What shipped, why it counts.",
        link:  "https://...",     // optional — the proof. omit if none.
        tags:  ["cli", "python"]  // optional
      },

  Rule: an entry only goes here once a stranger can open it. No drafts.
  No build step. Save, commit, push. That's a ship.
  ════════════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ship Log — Yash Shrivardhankar</title>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #232a33;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --accent:    #4ec9b0;
    --accent-dim:#2a5d54;
    --link:      #6cb6ff;
    --radius:    12px;
    --maxw:      680px;
    --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:      ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--font); line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 64px 20px 96px; }
  header { margin-bottom: 40px; }
  h1 { font-size: 28px; margin: 0 0 6px; letter-spacing: -0.02em; }
  .sub { color: var(--muted); font-size: 15px; margin: 0; }
  .stats {
    display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap;
  }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; min-width: 96px;
  }
  .stat .n { font-size: 24px; font-weight: 650; color: var(--accent); font-family: var(--mono); }
  .stat .l { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .feed { list-style: none; margin: 0; padding: 0; position: relative; }
  .feed::before {
    content: ""; position: absolute; left: 7px; top: 8px; bottom: 8px;
    width: 2px; background: var(--border);
  }
  .entry { position: relative; padding: 0 0 28px 36px; }
  .entry::before {
    content: ""; position: absolute; left: 0; top: 6px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--bg); border: 2px solid var(--accent);
  }
  .entry .date { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .entry h2 { font-size: 18px; margin: 4px 0 6px; letter-spacing: -0.01em; }
  .entry p { margin: 0 0 10px; color: var(--text); }
  .entry a.proof {
    color: var(--link); text-decoration: none; font-size: 14px;
    border-bottom: 1px solid var(--accent-dim);
  }
  .entry a.proof:hover { border-bottom-color: var(--link); }
  .tags { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-family: var(--mono); font-size: 11px; color: var(--accent);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px;
  }
  footer { margin-top: 56px; color: var(--muted); font-size: 13px; }
  footer a { color: var(--link); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Ship Log</h1>
    <p class="sub">Public record of things finished and put in the world. One link per ship. No drafts.</p>
    <div class="stats">
      <div class="stat"><div class="n" id="total">0</div><div class="l">ships</div></div>
      <div class="stat"><div class="n" id="days">—</div><div class="l">since first</div></div>
      <div class="stat"><div class="n" id="last">—</div><div class="l">last ship</div></div>
    </div>
  </header>

  <ul class="feed" id="feed"></ul>

  <footer>
    Built by Yash Shrivardhankar · <a href="https://github.com/shrivardhankaryash007/shiplog">source</a>
  </footer>
</div>

<script>
  // ── SHIPS ──────────────────────────────────────────────────────────
  // Newest first. See the comment at the very top of this file to add one.
  const SHIPS = [
    {
      date: "2026-06-18",
      title: "Shipped this Ship Log",
      body:  "A public, dated, zero-build-step record of what I finish. The first entry is itself. Adding a ship is a four-line edit — friction is the enemy of a streak.",
      link:  "https://github.com/shrivardhankaryash007/shiplog",
      tags:  ["html", "meta", "habit"]
    },
  ];
  // ────────────────────────────────────────────────────────────────────

  const fmt = (iso) => {
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
  };
  const esc = (s) => s.replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

  const feed = document.getElementById("feed");
  const sorted = [...SHIPS].sort((a, b) => b.date.localeCompare(a.date));

  sorted.forEach(s => {
    const li = document.createElement("li");
    li.className = "entry";
    const proof = s.link ? `<a class="proof" href="${esc(s.link)}" target="_blank" rel="noopener">→ proof</a>` : "";
    const tags = (s.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join("");
    li.innerHTML = `
      <div class="date">${fmt(s.date)}</div>
      <h2>${esc(s.title)}</h2>
      <p>${esc(s.body)}</p>
      ${proof}
      ${tags ? `<div class="tags">${tags}</div>` : ""}`;
    feed.appendChild(li);
  });

  document.getElementById("total").textContent = SHIPS.length;
  if (SHIPS.length) {
    const dates = SHIPS.map(s => s.date).sort();
    const first = new Date(dates[0] + "T00:00:00");
    const last  = new Date(dates[dates.length - 1] + "T00:00:00");
    document.getElementById("days").textContent = Math.max(0, Math.round((Date.now() - first) / 864e5));
    document.getElementById("last").textContent = fmt(dates[dates.length - 1]);
  }
</script>
</body>
</html>
